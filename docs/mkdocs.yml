site_name: gobekli_api
site_description: API key generation, parsing, hashing, verification, and storage abstraction for Go
site_author: Package Foundry
site_url: https://github.com/package-foundry/gobekli_api

repo_url: https://github.com/package-foundry/gobekli_api
repo_name: package-foundry/gobekli_api

copyright: "Copyright &copy; 2026 Package Foundry"

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      background: white
      surface: "#f8f9fa"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      background: "#1e1e1e"
      surface: "#2d2d2d"
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __ Span
      pygments_lang: python
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.mark
  - admonition
  - codehilite:
      css_class: highlight
  - footnotes
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - API Reference:
      - Generator: api/generator.md
      - Parsing: api/parse.md
      - Hashing: api/hash.md
      - Verification: api/verify.md
      - Storage: api/store.md
  - Security: security.md
  - Design Decisions: design.md

plugins:
  - search:
      separator: "[-]+"
      previews: true
      previews_length: 200

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/package-foundry/gobekli_api
    - icon: fontawesome/brands/mastodon
      link: https://fosstodon.org/@packagefoundry